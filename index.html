<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5VLYHZTGTX');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <style>
        body {
        font-family: Arial;
        background: rgba(17, 24, 39, 1);
        padding: 20px;
        }

        .pagina {
        display: none;
        background: rgba(17, 24, 39, 1);
        padding: 10px;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(153, 0, 255, 0.1);
        }

        .ativa {
        display: block;
        }

        button {
        padding: 0.6em 2em;
        border: none;
        outline: none;
        color: rgb(255, 255, 255);
        background: #111;
        cursor: pointer;
        position: relative;
        z-index: 0;
        border-radius: 10px;
        user-select: none;
        -webkit-user-select: none;
        touch-action: manipulation;
        display: block;
        margin-bottom: 10px;
        }

        .button:before {
        content: "";
        background: linear-gradient(
            20deg,
            #ff0000,
            #7b00ff,
            #ff00c8,
            #ff0000
        );
        position: absolute;
        top: -2px;
        left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(5px);
        -webkit-filter: blur(5px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing-button-85 20s linear infinite;
        transition: opacity 0.3s ease-in-out;
        border-radius: 10px;
        text-decoration: none;
        }

        .button:after {
        z-index: -1;
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: #222;
        left: 0;
        top: 0;
        border-radius: 20px;
        }
            
        div {
        width: 90%;
        max-width: 600px;
        background: linear-gradient(#f3f1f1, #ffffff) padding-box,
                    linear-gradient(145deg, transparent 35%,#e81cff, #40c9ff) border-box;
        border: 2px solid transparent;
        padding: 0 auto;
        font-size: 14px;
        font-family: inherit;
        color: rgb(255, 255, 255);
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-sizing: border-box;
        border-radius: 16px;
        text-align: justify;
        margin: 0 auto;
        }
         
    </style>
</head>
<body>
    <!-- PÁGINA 1 -->
    <div id="p1" class="pagina ativa">
    <p>O que você quer fazer:</p>
    <button class="button" onclick="location.href='PageInstalação.html'">
    Instalação</button>
    <button class="button" onclick="location.href='PageReparo.html'">
    Reparo</button>
    </div>
</body>
